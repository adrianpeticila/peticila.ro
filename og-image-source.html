<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #060606;
    font-family: 'Georgia', serif;
    display: flex; flex-direction: column; justify-content: center;
    padding: 80px;
  }
  .top { font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: #888; margin-bottom: 32px; font-family: monospace; }
  .name { font-size: 72px; font-weight: 900; color: #D42020; line-height: 1; font-family: sans-serif; text-transform: lowercase; }
  .surname { font-size: 72px; font-weight: 900; color: #F0EBE0; line-height: 1; font-family: sans-serif; text-transform: lowercase; }
  .title { margin-top: 28px; font-size: 20px; color: #888; font-family: monospace; letter-spacing: 0.05em; }
  .domain { position: absolute; bottom: 40px; right: 80px; font-size: 13px; color: #3A3A38; font-family: monospace; letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="top">peticila.ro</div>
  <div class="name">adrian m.</div>
  <div class="surname">peticila</div>
  <div class="title">cmo · brand strategist · founder, aah monster!</div>
  <div class="domain">peticila.ro</div>
</body>
</html>
